<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} - CognixAsset</title>
  <style>
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:#060A14; color:#EDF2FB; font-family:Arial, sans-serif; }
    .panel { width:min(520px, calc(100% - 32px)); background:#0D1220; border:1px solid #1E2A45; border-radius:8px; padding:28px; }
    .code { color:#F4A226; font-size:12px; letter-spacing:.12em; text-transform:uppercase; }
    h1 { margin:10px 0; font-size:28px; }
    p { color:#7B8DB5; line-height:1.5; }
    a { color:#A8C8FF; text-decoration:none; font-weight:600; }
  </style>
</head>
<body>
  <main class="panel">
    <div class="code">{{ statusCode }}</div>
    <h1>{{ title }}</h1>
    <p>{{ message }}</p>
    <a href="{% if user %}/dashboard{% else %}/login{% endif %}">Go back safely</a>
  </main>
</body>
</html>
